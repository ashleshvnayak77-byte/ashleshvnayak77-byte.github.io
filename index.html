<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashlesh Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#0a0a0f;
  color:#fff;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index:-1;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}
.nav-links{
  display:flex;
  gap:40px;
}
.nav-links a{
  color:#aaa;
  text-decoration:none;
}
.nav-btn{
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #444;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:90vh;
  padding:0 80px;
}

.hero-left h1{
  font-size:60px;
  font-weight:700;
}

.highlight{
  color:#7c6cff;
}

.typing{
  margin-top:10px;
  font-size:24px;
  color:#aaa;
}

.hero-left p{
  margin-top:20px;
  color:#888;
  max-width:500px;
}

.buttons{
  margin-top:30px;
  display:flex;
  gap:20px;
}

.btn{
  padding:15px 25px;
  border-radius:12px;
  text-decoration:none;
}

.btn-primary{
  background:linear-gradient(135deg,#7c6cff,#5a4cff);
}

.btn-secondary{
  border:1px solid #555;
}

/* PROFILE */
.profile{
  position:relative;
}

.profile img{
  width:280px;
  height:280px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #7c6cff;
}

.profile::after{
  content:"";
  position:absolute;
  top:-20px;
  left:-20px;
  right:-20px;
  bottom:-20px;
  border-radius:50%;
  background:rgba(124,108,255,0.2);
  filter:blur(30px);
  z-index:-1;
}

.tag{
  margin-top:20px;
  background:#1a1a25;
  padding:8px 15px;
  border-radius:20px;
  display:inline-block;
  color:#ccc;
}

@media(max-width:900px){
  .hero{flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<!-- NAV -->
<div class="navbar">
  <h2>AN</h2>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>
  <div class="nav-btn">Visit Repo</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>Hi, I'm <span class="highlight">Ashlesh Nayak</span></h1>
    <div class="typing">AI Developer |</div>
    <p>
      Computer Science student passionate about creating innovative solutions and exploring artificial intelligence.
    </p>
    <div class="buttons">
      <a href="#" class="btn btn-primary">GitHub Profile</a>
      <a href="#" class="btn btn-secondary">Resume</a>
    </div>
  </div>

  <div class="profile">
    <img src="YOUR_PHOTO.jpg">
    <div class="tag">● Full-time student</div>
  </div>
</section>

<script>
const roles = ["AI Developer","Full Stack Developer","Python Enthusiast"];
let i=0,j=0,current="",isDeleting=false;
const typing=document.querySelector(".typing");

function type(){
  if(i<roles.length){
    if(!isDeleting && j<=roles[i].length){
      current=roles[i].substring(0,j++);
    }else if(isDeleting && j>=0){
      current=roles[i].substring(0,j--);
    }

    typing.innerHTML=current+" |";

    if(j===roles[i].length) isDeleting=true;
    if(j===0 && isDeleting){
      isDeleting=false;
      i++;
    }
  }else i=0;

  setTimeout(type,100);
}

type();
</script>

</body>
</html>
